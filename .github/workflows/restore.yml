name: Restore from Backup (manual)

on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest

    steps:
      - name: Restore over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            APP_DIR="/home/ec2-user/demo-gh-action-cd-minimo"
            BAK_DIR="/home/ec2-user/demo-gh-action-cd-minimo-bak"

            if [ ! -d "$BAK_DIR" ]; then
              echo "No existe backup para restore"
              exit 1
            fi

            find "$APP_DIR" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
            cp -a "$BAK_DIR/." "$APP_DIR/"

            cd "$APP_DIR"
            docker compose up -d --build --force-recreate
            sleep 5
            docker ps
            sleep 5
            docker compose logs --tail=30 api
            sleep 10
            curl -fsS http://localhost/health

            echo "Restore manual OK"
