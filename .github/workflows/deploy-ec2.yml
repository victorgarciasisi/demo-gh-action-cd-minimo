name: Deploy to EC2

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            APP_DIR="/home/ec2-user/demo-gh-action-cd-minimo"
            BAK_DIR="/home/ec2-user/demo-gh-action-cd-minimo-bak"

            cd "$APP_DIR"
            git pull --ff-only origin main

            docker compose up -d --build
            sleep 5
            docker compose ps

            if curl -fsS http://localhost/health; then
              rm -rf "$BAK_DIR"
              cp -a "$APP_DIR" "$BAK_DIR"
              echo "Deploy OK + backup actualizado"
            else
              echo "Healthcheck KO. Iniciando restore de backup"
              if [ -d "$BAK_DIR" ]; then
                rsync -a --delete "$BAK_DIR/" "$APP_DIR/"
                cd "$APP_DIR"
                docker compose up -d --build
                sleep 5
                curl -fsS http://localhost/health
                echo "Rollback OK desde backup"
              else
                echo "No existe backup para rollback"
                exit 1
              fi
            fi

            docker compose logs --tail=30 api
