name: CI/CD EC2

on:
  push:
    branches: ["main"]

jobs:
  secret_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (trufflehog)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --no-verification --results=verified,unknown,unverified

  dependency_audit:
    runs-on: ubuntu-latest
    needs: [secret_scan]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependency audit (pip-audit)
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit --no-deps -r api/requirements.txt

  lint:
    runs-on: ubuntu-latest
    needs: [dependency_audit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint
        run: ruff check api

  image_scan:
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t demo-512:${{ github.sha }} ./api

      - name: Scan image (Trivy)
        uses: aquasecurity/trivy-action@0.34.2
        with:
          scan-type: 'image'
          image-ref: 'demo-512:${{ github.sha }}'
          format: 'table'
          output: 'trivy.txt'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ github.run_number }}
          path: trivy.txt
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: [image_scan]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            APP_DIR="/home/ec2-user/demo-gh-action-cd-minimo"
            BAK_DIR="/home/ec2-user/demo-gh-action-cd-minimo-bak"

            cd "$APP_DIR"

            git pull
            docker compose up -d --build
            sleep 5
            docker compose ps
            sleep 5
            docker compose logs --tail=30 api
            sleep 10

            if curl -fsS http://localhost/health >/dev/null 2>&1; then
              rm -rf "$BAK_DIR"
              cp -a "$APP_DIR" "$BAK_DIR"
              rm -rf "$BAK_DIR/.git"
              echo "Deploy OK + backup actualizado"
            else
              echo "Healthcheck KO. Backup no actualizado"
              exit 1
            fi
