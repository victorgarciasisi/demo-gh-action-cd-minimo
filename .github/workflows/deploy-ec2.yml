name: Deploy to EC2

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            APP_DIR="/home/ec2-user/demo-gh-action-cd-minimo"
            BAK_DIR="/home/ec2-user/demo-gh-action-cd-minimo-bak"

            cd "$APP_DIR"

            # Seed inicial: si no existe backup, lo creamos con el estado actual.
            if [ ! -d "$BAK_DIR" ]; then
              mkdir -p "$BAK_DIR"
              cp -a "$APP_DIR/." "$BAK_DIR/"
              echo "Backup inicial creado en $BAK_DIR"
            fi

            git pull --ff-only origin main

            docker compose up -d --build
            sleep 5
            docker compose ps

            HEALTH_RC=0
            curl -fsS http://localhost/health >/dev/null 2>&1 || HEALTH_RC=$?

            if [ "$HEALTH_RC" -eq 0 ]; then
              rm -rf "$BAK_DIR"
              mkdir -p "$BAK_DIR"
              cp -a "$APP_DIR/." "$BAK_DIR/"
              echo "Deploy OK + backup actualizado"
            else
              echo "Healthcheck KO (rc=${HEALTH_RC}). Iniciando restore de backup"
              if [ -d "$BAK_DIR" ]; then
                if command -v rsync >/dev/null 2>&1; then
                  rsync -a --delete "$BAK_DIR/" "$APP_DIR/"
                else
                  find "$APP_DIR" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
                  cp -a "$BAK_DIR/." "$APP_DIR/"
                fi
                cd "$APP_DIR"
                docker compose up -d --build
                sleep 5
                curl -fsS http://localhost/health
                echo "Rollback OK desde backup"
              else
                echo "No existe backup para rollback"
                exit 1
              fi
            fi

            docker compose logs --tail=30 api
